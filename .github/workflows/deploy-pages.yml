name: Deploy Web game

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6.3
  GODOT_RELEASE: 4.6.3-stable
  GODOT_EXE: Godot_v4.6.3-stable_linux.x86_64
  GODOT_TEMPLATES_DIR: 4.6.3.stable

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Download Godot and Web export templates
        shell: bash
        run: |
          curl --fail --location --retry 3 \
            --output godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/${GODOT_EXE}.zip"
          curl --fail --location --retry 3 \
            --output export_templates.tpz \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          unzip -q godot.zip
          chmod +x "${GODOT_EXE}"
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}"
          unzip -q export_templates.tpz
          cp -R templates/. "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}/"

      - name: Import project
        run: |
          "./${GODOT_EXE}" --headless --path . --import --quit

      - name: Export Web game
        run: |
          mkdir -p build/web
          "./${GODOT_EXE}" --headless --path . --export-release Web build/web/index.html
          touch build/web/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Web game
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
